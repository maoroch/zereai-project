<div class="header-actions">

        <div class="message bot-message">
          <div class="message-avatar"><!-- <img src="assets/icon.svg">--> <div class="ico"></div> </div>

          <style>
.ico {
  width: 75%;      /* или другой размер */
  height: 75%;
  background-image: url('assets/icon.svg');
  background-size: cover;
  background-position: center;
}

          </style>

          <div class="message-content">
            Привет! Я Zere, ваш университетский ассистент. Чем могу помочь?
          </div>
        </div>

        <div class="input-wrapper">
          <textarea 
            id="question" 
            placeholder="Задать вопрос..."
            autocomplete="off"
            rows="1"
          ></textarea>
          <button id="askBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>

  <script>
    class ZereAI {
        constructor() {
            this.askBtn = document.getElementById('askBtn');
            this.questionInput = document.getElementById('question');
            this.messagesContainer = document.getElementById('messages');
            this.chatHistoryContainer = document.getElementById('chatHistory');
            this.apiBase = 'http://localhost:3000';
            this.currentChatId = this.generateChatId();
            this.init();
        }

        init() {
            this.setupEventListeners();
            this.setupTextareaAutoResize();
            this.loadChatHistory();
            console.log('✅ Zere AI интерфейс готов к работе');
        }

        setupEventListeners() {
            this.askBtn.addEventListener('click', () => this.askQuestion());
            
            this.questionInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    this.askQuestion();
                }
            });

            this.questionInput.addEventListener('input', () => {
                this.askBtn.disabled = !this.questionInput.value.trim();
            });
        }

        setupTextareaAutoResize() {
            this.questionInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });
        }

        generateChatId() {
            return 'chat_' + Date.now();
        }

        // Сохранение сообщения в историю
        saveMessage(role, text) {
            let history = JSON.parse(localStorage.getItem('chatHistory') || '{}');
            
            if (!history[this.currentChatId]) {
                history[this.currentChatId] = {
                    id: this.currentChatId,
                    title: text.substring(0, 50) + (text.length > 50 ? '...' : ''),
                    messages: [],
                    createdAt: Date.now(),
                    updatedAt: Date.now()
                };
            }

            history[this.currentChatId].messages.push({
                role: role,
                text: text,
                time: Date.now()
            });

            history[this.currentChatId].updatedAt = Date.now();
            
            // Обновляем заголовок чата первым сообщением пользователя
            if (role === 'user' && history[this.currentChatId].messages.length === 1) {
                history[this.currentChatId].title = text.substring(0, 50) + (text.length > 50 ? '...' : '');
            }

            localStorage.setItem('chatHistory', JSON.stringify(history));
            this.loadChatHistory();
        }

        // Загрузка истории чатов
        loadChatHistory() {
            const history = JSON.parse(localStorage.getItem('chatHistory') || '{}');
            const chatHistoryContainer = this.chatHistoryContainer;
            
            if (!chatHistoryContainer) return;

            const chats = Object.values(history).sort((a, b) => b.updatedAt - a.updatedAt);
            
            if (chats.length === 0) {
                chatHistoryContainer.innerHTML = '<div class="empty-history">Нет сохраненных чатов</div>';
                return;
            }

            // Группируем по дням
            const today = new Date().toDateString();
            const yesterday = new Date(Date.now() - 86400000).toDateString();
            
            const todayChats = chats.filter(chat => new Date(chat.updatedAt).toDateString() === today);
            const yesterdayChats = chats.filter(chat => new Date(chat.updatedAt).toDateString() === yesterday);
            const olderChats = chats.filter(chat => {
                const chatDate = new Date(chat.updatedAt).toDateString();
                return chatDate !== today && chatDate !== yesterday;
            });

            let html = '';

            if (todayChats.length > 0) {
                html += '<div class="history-section"><div class="history-title">Сегодня</div>';
                todayChats.forEach(chat => {
                    html += this.createHistoryItemHTML(chat);
                });
                html += '</div>';
            }

            if (yesterdayChats.length > 0) {
                html += '<div class="history-section"><div class="history-title">Вчера</div>';
                yesterdayChats.forEach(chat => {
                    html += this.createHistoryItemHTML(chat);
                });
                html += '</div>';
            }

            if (olderChats.length > 0) {
                html += '<div class="history-section"><div class="history-title">Ранее</div>';
                olderChats.forEach(chat => {
                    html += this.createHistoryItemHTML(chat);
                });
                html += '</div>';
            }

            chatHistoryContainer.innerHTML = html;
        }

        createHistoryItemHTML(chat) {
            const isActive = chat.id === this.currentChatId;
            const time = new Date(chat.updatedAt).toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit'
            });
            
            return `
                <div class="history-item ${isActive ? 'active' : ''}" 
                     onclick="zereAI.loadChat('${chat.id}')">
                    <span>${chat.title}</span>
                    <div>
                        <span class="history-item-time">${time}</span>
                        <button class="delete-history-btn" onclick="event.stopPropagation(); zereAI.deleteChat('${chat.id}')">×</button>
                    </div>
                </div>
            `;
        }

        // Загрузка конкретного чата
        loadChat(chatId) {
            const history = JSON.parse(localStorage.getItem('chatHistory') || '{}');
            const chat = history[chatId];
            
            if (!chat) return;

            this.currentChatId = chatId;
            this.messagesContainer.innerHTML = '';

            chat.messages.forEach(message => {
                this.addMessage(message.text, message.role);
            });

            this.loadChatHistory();
            this.scrollToBottom();
        }

        // Удаление чата
        deleteChat(chatId) {
            if (confirm('Удалить этот чат?')) {
                let history = JSON.parse(localStorage.getItem('chatHistory') || '{}');
                delete history[chatId];
                localStorage.setItem('chatHistory', JSON.stringify(history));
                
                if (chatId === this.currentChatId) {
                    this.newChat();
                }
                
                this.loadChatHistory();
            }
        }

        async askQuestion() {
            const question = this.questionInput.value.trim();
            if (!question) return;

            // Добавляем сообщение пользователя
            this.addMessage(question, 'user');
            this.saveMessage('user', question);
            this.questionInput.value = '';
            this.questionInput.style.height = 'auto';
            this.askBtn.disabled = true;

            // Показываем индикатор набора
            this.showTypingIndicator();

            const startTime = Date.now();

            try {
                console.log(`📤 Отправка запроса: "${question}"`);

                const response = await fetch(`${this.apiBase}/ai`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ question })
                });

                const endTime = Date.now();
                const responseTime = endTime - startTime;

                console.log(`✅ Ответ получен за ${responseTime}ms`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                console.log('📦 Данные ответа:', data);
                
                // Убираем индикатор и добавляем ответ с эффектом печати
                this.hideTypingIndicator();
                
                if (data.success) {
                    await this.typeMessage(data.answer, 'bot');
                    this.saveMessage('bot', data.answer);
                    console.log('🧠 Финальный ответ:', data.answer);
                } else {
                    this.addMessage(`Ошибка: ${data.error}`, 'bot');
                    this.saveMessage('bot', `Ошибка: ${data.error}`);
                }

            } catch (err) {
                console.error('❌ Ошибка запроса:', err);
                this.hideTypingIndicator();
                this.addMessage(`Ошибка подключения: ${err.message}`, 'bot');
                this.saveMessage('bot', `Ошибка подключения: ${err.message}`);
            } finally {
                this.askBtn.disabled = false;
                console.log('--- Запрос завершен ---\n');
            }
        }

        // Эффект печатания текста
        async typeMessage(text, sender, speed = 20) {
            return new Promise((resolve) => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}-message`;
                
                const avatarDiv = document.createElement('div');
                avatarDiv.className = 'message-avatar';
                avatarDiv.textContent = sender === 'user' ? 'U' : 'AI';
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                
                messageDiv.appendChild(avatarDiv);
                messageDiv.appendChild(contentDiv);
                this.messagesContainer.appendChild(messageDiv);
                
                let i = 0;
                const timer = setInterval(() => {
                    if (i < text.length) {
                        contentDiv.textContent += text.charAt(i);
                        i++;
                        this.scrollToBottom();
                    } else {
                        clearInterval(timer);
                        resolve();
                    }
                }, speed);
            });
        }

        addMessage(content, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            
            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'message-avatar';
            avatarDiv.textContent = sender === 'user' ? 'U' : 'AI';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            
            messageDiv.appendChild(avatarDiv);
            messageDiv.appendChild(contentDiv);
            this.messagesContainer.appendChild(messageDiv);
            this.scrollToBottom();
        }

        showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot-message';
            typingDiv.id = 'typing-indicator';
            
            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'message-avatar';
            avatarDiv.textContent = 'AI';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'typing-indicator';
            typingIndicator.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            
            contentDiv.appendChild(typingIndicator);
            typingDiv.appendChild(avatarDiv);
            typingDiv.appendChild(contentDiv);
            this.messagesContainer.appendChild(typingDiv);
            this.scrollToBottom();
        }

        hideTypingIndicator() {
            const typingIndicator = document.getElementById('typing-indicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        scrollToBottom() {
            this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
        }

        // Новые методы для управления чатами
        newChat() {
            this.currentChatId = this.generateChatId();
            this.messagesContainer.innerHTML = `
                <div class="message bot-message">
                    <div class="message-avatar"><img src="assets/icon.svg"></div>
                    <div class="message-content">
                        Привет! Я Zere, ваш университетский ассистент сделанный. Чем могу помочь?
                    </div>
                </div>
            `;
            this.loadChatHistory();
        }

        clearChat() {
            if (confirm('Очистить всю историю чатов?')) {
                localStorage.removeItem('chatHistory');
                this.newChat();
                this.loadChatHistory();
            }
        }

exportChat() {
    const history = JSON.parse(localStorage.getItem('chatHistory') || '{}');
    const currentChat = history[this.currentChatId];
    
    if (!currentChat) {
        alert('Нет данных для экспорта');
        return;
    }
    
    let textContent = `Чат: ${currentChat.title}\n`;
    textContent += `Дата: ${new Date(currentChat.createdAt).toLocaleString('ru-RU')}\n`;
    textContent += '─'.repeat(50) + '\n\n';
    
    currentChat.messages.forEach(message => {
        const sender = message.role === 'user' ? 'Вы' : 'Zere AI';
        const time = new Date(message.time).toLocaleTimeString('ru-RU');
        textContent += `[${time}] ${sender}:\n${message.text}\n\n`;
    });
    
    const dataBlob = new Blob([textContent], {type: 'text/plain;charset=utf-8'});
    
    const link = document.createElement('a');
    link.href = URL.createObjectURL(dataBlob);
    link.download = `zere-ai-chat-${currentChat.title.substring(0, 20)}.txt`;
    link.click();
}    }

    document.addEventListener('DOMContentLoaded', () => {
        window.zereAI = new ZereAI();
    });
  </script>
  <script src="modalNews.js"></script>

  <script src="announcement.js"></script>
</body>
</html>
