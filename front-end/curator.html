<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>QR Requests Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Панель QR-заявок</h1>

        <label for="curator-select">Выберите куратора:</label>
        <select id="curator-select">
            <option value="">--Выберите куратора--</option>
            <option value="Иванов И.И.">Иванов И.И.</option>
            <option value="Смирнова А.А.">Смирнова А.А.</option>
        </select>

        <div id="student-list">
            <!-- Здесь будут отображаться студенты и их заявки -->
        </div>
    </div>


    <style>
body {
    font-family: Arial, sans-serif;
    background-color: #f9f9f9;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 700px;
    margin: 50px auto;
    padding: 20px;
    background-color: #fff;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
}

.student {
    border: 1px solid #ddd;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
}

.student h3 {
    margin: 0 0 5px 0;
}

.request {
    padding: 5px;
    margin-top: 5px;
    background-color: #f1f1f1;
    border-radius: 4px;
}

.request-buttons {
    margin-top: 5px;
}

.request-buttons button {
    margin-right: 5px;
    padding: 4px 8px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

.request-buttons button.approve {
    background-color: #4CAF50;
    color: white;
}

.request-buttons button.reject {
    background-color: #f44336;
    color: white;
}

    </style>
   
   
   
   
   
   
<script>
const curatorSelect = document.getElementById('curator-select');
const studentList = document.getElementById('student-list');

const data = {
    "Иванов И.И.": [
        {
            fio: "Петров П.П.",
            requests: [
                { id: 1, date: "2025-11-09", reason: "Сходить к врачу", status: "pending" },
                { id: 2, date: "2025-11-08", reason: "Личная причина", status: "pending" }
            ]
        },
        {
            fio: "Сидоров С.С.",
            requests: [
                { id: 3, date: "2025-11-09", reason: "Учебное мероприятие", status: "pending" }
            ]
        }
    ],
    "Смирнова А.А.": [
        {
            fio: "Кузнецов К.К.",
            requests: [
                { id: 4, date: "2025-11-09", reason: "Спортивное мероприятие", status: "pending" }
            ]
        }
    ]
};

curatorSelect.addEventListener('change', () => {
    const selectedCurator = curatorSelect.value;
    studentList.innerHTML = '';

    if (selectedCurator && data[selectedCurator]) {
        data[selectedCurator].forEach(student => {
            const studentDiv = document.createElement('div');
            studentDiv.className = 'student';

            const h3 = document.createElement('h3');
            h3.textContent = student.fio;
            studentDiv.appendChild(h3);

            if (student.requests.length > 0) {
                student.requests.forEach(req => {
                    const reqDiv = document.createElement('div');
                    reqDiv.className = 'request';
                    reqDiv.textContent = `${req.date}: ${req.reason} [${req.status}]`;

                    // Создаем кнопки
                    const buttonsDiv = document.createElement('div');
                    buttonsDiv.className = 'request-buttons';

                    const approveBtn = document.createElement('button');
                    approveBtn.className = 'approve';
                    approveBtn.textContent = 'Принять';
                    approveBtn.addEventListener('click', () => {
                        req.status = 'approved';
                        render(); // обновляем отображение
                    });

                    const rejectBtn = document.createElement('button');
                    rejectBtn.className = 'reject';
                    rejectBtn.textContent = 'Отклонить';
                    rejectBtn.addEventListener('click', () => {
                        req.status = 'rejected';
                        render(); // обновляем отображение
                    });

                    buttonsDiv.appendChild(approveBtn);
                    buttonsDiv.appendChild(rejectBtn);
                    reqDiv.appendChild(buttonsDiv);

                    studentDiv.appendChild(reqDiv);
                });
            } else {
                const emptyDiv = document.createElement('div');
                emptyDiv.textContent = "Заявок нет";
                studentDiv.appendChild(emptyDiv);
            }

            studentList.appendChild(studentDiv);
        });
    }
});

// функция для перерисовки списка
function render() {
    curatorSelect.dispatchEvent(new Event('change'));
}

// изначальный рендер
render();
    </script>
</body>
</html>
