services:
  express:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - SEARCH_API_URL=http://fastapi:7860
      - GROQ_API_KEY=${GROQ_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=8080
    depends_on:
      fastapi:
        condition: service_healthy
    restart: unless-stopped

  fastapi:                       # ← должно быть на том же уровне, что и express, с отступом 2 пробела
    build:
      context: ./zere-search-api
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    volumes:
      - ./zere-search-api/data:/app/data:ro   # ← относительный путь
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped